name: Edge Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --workspace --locked

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - runner: macos-26
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build nac
        run: cargo build --release --locked -p nac --target ${{ matrix.target }}

      - name: Package archive
        run: |
          mkdir -p dist
          tar -czf "dist/nac-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" nac

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: nac-${{ matrix.target }}
          path: dist/nac-${{ matrix.target }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nac-*
          merge-multiple: true

      - name: Publish edge release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git fetch --tags origin

          if gh release view edge >/dev/null 2>&1; then
            git tag -f edge "$GITHUB_SHA"
            git push origin refs/tags/edge --force
            gh release upload edge dist/* --clobber
          else
            gh release create edge dist/* \
              --title edge \
              --notes "Latest main build of nac." \
              --prerelease \
              --target "$GITHUB_SHA"
          fi
