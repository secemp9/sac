name: Python Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nac

jobs:
  build-python-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run nac tests
        run: cargo test -p nac --locked

      - name: Build nac
        run: cargo build --release --locked -p nac

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy nac binary for image build
        run: cp target/release/nac images/nac

      - name: Build and push python image
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}:python \
            -f images/Dockerfile.python images/
          docker push ${{ env.IMAGE_PREFIX }}:python

      - name: Clean up copied binary
        if: always()
        run: rm -f images/nac
